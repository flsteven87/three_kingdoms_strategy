# Three Kingdoms Strategy Manager - Optimized Nginx Configuration
#
# 符合 CLAUDE.md 規範:
# - React Router SPA fallback support
# - Static assets caching
# - Gzip compression
# - Security headers
# - Health check endpoint

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static assets with long cache
        # 符合前端最佳實踐: JS/CSS/Images 使用長期緩存（hash filename → safe to cache forever）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML entry + build manifest must always revalidate.
        # 否則 LINE WebView / browser cache 會持有舊的 index.html
        # → 持續引用已下架的 JS hash → 用戶卡在舊版。
        location ~ ^/(index\.html|build-info\.json)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # React Router SPA fallback
        # 符合 CLAUDE.md 🟢: 支援 client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        # 用於 Zeabur 健康檢查
        location = /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # API proxy (optional - if frontend and backend share same domain)
        # Uncomment if you want to proxy API requests to backend
        # location /api/ {
        #     proxy_pass http://backend-service:8087;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_cache_bypass $http_upgrade;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
